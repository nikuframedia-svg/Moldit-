constraints:
  setup_crew:
    enabled: true
    max_simultaneous: 1
    description: "Max 1 setup simultaneo na fabrica inteira"
  tool_timeline:
    enabled: true
    description: "Ferramenta so pode estar em 1 maquina de cada vez"
  calco_timeline:
    enabled: true
    description: "Calco so pode estar em 1 local de cada vez (mais restritivo que tool)"
  operator_pool:
    enabled: true
    mode: advisory
    description: "Capacidade por turno — advisory, nunca bloqueia"

scheduling:
  buffer_days: 2
  economic_lot_mode: soft
  oee: 0.66
  day_capacity_minutes: 1020
  effective_capacity_minutes: 673
  weights:
    tardiness: 100
    earliness: 10
    setups: 1
  max_solve_seconds: 60
  seed: 42

alerts:
  atraso_threshold: 0
  red_threshold: 1
  yellow_threshold: 3
  coverage_horizon: 5

rules:
  - id: francisco_mp_262_170
    name: "MP partilhada 262/170"
    description: "Ref 1092262X100 e 1065170X100 partilham materia-prima, produzir na mesma maquina PRM019"
    condition:
      type: same_material_as
      params:
        refs: ["1092262X100", "1065170X100"]
    action:
      type: group_with
      params:
        machine: PRM019
    active: true
    priority: 0
    created_by: francisco
