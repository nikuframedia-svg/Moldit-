# ProdPlan PP1 — Docker Compose (pre-built images from Docker Hub)
#
# Uso:
#   docker compose -f docker-compose.hub.yml up -d
#
# Ou renomeia para docker-compose.yml e corre:
#   docker compose up -d

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pp1}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pp1secret}
      POSTGRES_DB: ${POSTGRES_DB:-pp1}
    volumes:
      - pp1-pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pp1} -d ${POSTGRES_DB:-pp1}"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - pp1-network

  backend:
    image: fxcgvhjkihugyftd/pp1-backend:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-pp1}:${POSTGRES_PASSWORD:-pp1secret}@postgres:5432/${POSTGRES_DB:-pp1}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DEBUG: ${DEBUG:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost"]}
      API_KEYS: ${API_KEYS:-[]}
      NIKUFRA_DATA_DIR: ${NIKUFRA_DATA_DIR:-data/nikufra}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - pp1-network

  frontend:
    image: fxcgvhjkihugyftd/pp1-frontend:latest
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 15s
      timeout: 5s
      retries: 3
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - pp1-network

volumes:
  pp1-pgdata:

networks:
  pp1-network:
    driver: bridge
