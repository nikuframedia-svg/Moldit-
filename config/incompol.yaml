# PP1 — Dados Mestre Incompol
# Fonte: ISOP__Nikufra.xlsx (ISOP completo com todos os campos)
# Twins: ISOP__Nikufra_17_3.xlsx (coluna "Peça Gémea")
#
# Este ficheiro contém dados que NÃO vêm do ISOP semanal.
# O ISOP semanal traz: demanda (NP), stock, eco lots, pH, operadores.
# Este ficheiro traz: máquinas alternativas, setup times, twins.
#
# O parser lê AMBOS: ISOP semanal + este ficheiro.

# ─── FÁBRICA ───

factory:
  name: Incompol
  tenant_id: incompol
  timezone: Europe/Lisbon
  oee_default: 0.66

# ─── MÁQUINAS ───

machines:
  PRM019:
    group: Grandes
    day_capacity_min: 1020  # 07:00-00:00 = 17h
  PRM031:
    group: Grandes
    day_capacity_min: 1020
  PRM039:
    group: Grandes
    day_capacity_min: 1020
  PRM042:
    group: Medias
    day_capacity_min: 1020
  PRM043:
    group: Grandes
    day_capacity_min: 1020
  # PRM020: FORA DE USO — NÃO INCLUIR

# ─── TURNOS ───

shifts:
  Grandes:
    A: { start: "07:00", end: "15:30", equipa: 5 }
    B: { start: "15:30", end: "00:00", equipa: 5 }
    geral: { start: "07:00", end: "16:00", equipa: 1 }
    # Total turno A: 5+1=6 | overlap 15:30-16:00: 5+1=6 | turno B após 16:00: 5
  Medias:
    A: { start: "07:00", end: "15:30", equipa: 5 }
    B: { start: "15:30", end: "00:00", equipa: 4 }
    geral: { start: "07:00", end: "16:00", equipa: 4 }
    # Total turno A: 5+4=9 | overlap 15:30-16:00: 4+4=8 | turno B após 16:00: 4

# ─── MÁQUINAS ALTERNATIVAS ───
# Fonte: coluna "Máquina alternativa" do ISOP completo
# 29 ferramentas com alternativa real. PRM042 NUNCA tem alternativa.

alt_machines:
  # PRM031 → PRM039 (7 ferramentas)
  BFP079: { primary: PRM031, alt: PRM039 }
  BFP083: { primary: PRM031, alt: PRM039 }
  BFP114: { primary: PRM031, alt: PRM039 }
  BFP162: { primary: PRM031, alt: PRM039 }
  BFP171: { primary: PRM031, alt: PRM039 }
  BFP183: { primary: PRM031, alt: PRM039 }
  BFP184: { primary: PRM031, alt: PRM039 }

  # PRM039 → PRM043 (8 ferramentas)
  BFP091: { primary: PRM039, alt: PRM043 }
  BFP092: { primary: PRM039, alt: PRM043 }
  BFP096: { primary: PRM039, alt: PRM043 }
  BFP100: { primary: PRM039, alt: PRM043 }
  BFP101: { primary: PRM039, alt: PRM043 }
  BFP110: { primary: PRM039, alt: PRM043 }
  BFP178: { primary: PRM039, alt: PRM043 }
  VUL127: { primary: PRM039, alt: PRM043 }

  # PRM019 → PRM043 (5 ferramentas)
  BFP179: { primary: PRM019, alt: PRM043 }
  BFP181: { primary: PRM019, alt: PRM043 }
  BFP192: { primary: PRM019, alt: PRM043 }
  BFP197: { primary: PRM019, alt: PRM043 }
  VUL038: { primary: PRM019, alt: PRM043 }

  # PRM043 → PRM039 (4 ferramentas)
  BFP125: { primary: PRM043, alt: PRM039 }
  BFP172: { primary: PRM043, alt: PRM039 }
  BFP187: { primary: PRM043, alt: PRM039 }
  BFP204: { primary: PRM043, alt: PRM039 }

  # PRM019 → PRM039 (2 ferramentas)
  BFP080: { primary: PRM019, alt: PRM039 }
  BFP082: { primary: PRM019, alt: PRM039 }

  # PRM039 → PRM031 (2 ferramentas)
  BFP112: { primary: PRM039, alt: PRM031 }
  BFP186: { primary: PRM039, alt: PRM031 }

  # PRM043 → PRM031 (1 ferramenta)
  BFP188: { primary: PRM043, alt: PRM031 }

# ─── SETUP TIMES (horas) ───
# Fonte: coluna "Tp.Setup" do ISOP completo
# 4 categorias: 0.5h (30min), 1h (60min), 1.25h (75min), 1.5h (90min)
# OEE NÃO se aplica ao setup — é trabalho manual

setup_hours:
  # 0.5h (30 min) — 20 ferramentas
  BFP112: 0.5
  BFP171: 0.5
  BFP172: 0.5
  BFP178: 0.5
  BFP179: 0.5
  BFP181: 0.5
  BFP183: 0.5
  BFP184: 0.5
  BFP186: 0.5
  BFP187: 0.5
  BFP188: 0.5
  BFP192: 0.5
  BFP195: 0.5
  BFP197: 0.5
  BFP202: 0.5
  BFP204: 0.5
  EBR001: 0.5
  HAN002: 0.5
  HAN004: 0.5
  LEC002: 0.5
  MIC009: 0.5

  # 1.0h (60 min) — 13 ferramentas
  BFP079: 1.0
  BFP083: 1.0
  BFP091: 1.0
  BFP092: 1.0
  BFP096: 1.0
  BFP100: 1.0
  BFP101: 1.0
  BFP110: 1.0
  JDE002: 1.0
  JTE001: 1.0
  JTE003: 1.0
  VUL031: 1.0
  VUL068: 1.0
  VUL115: 1.0
  VUL127: 1.0

  # 1.25h (75 min) — 5 ferramentas
  BFP080: 1.25
  BFP082: 1.25
  BFP114: 1.25
  BFP162: 1.25
  VUL038: 1.25

  # 1.5h (90 min) — 2 ferramentas
  DYE025: 1.5
  VUL111: 1.5

  # NOTA: BFP125 tem setup diferente por SKU
  #   1403150X050: 0.75h (45 min)
  #   1413147X070: 1.0h (60 min)
  # Para simplificar, usar o MAIOR (1.0h).
  # Se necessário, implementar setup per-SKU na spec do scheduler.
  BFP125: 1.0

  # Default para ferramentas novas não listadas
  _default: 0.5

