# ─── SCHEDULER ───

scheduler:
  dispatch_rule: ATCS
  jit_enabled: true
  eco_lot_hard: true
  k1_values: [0.5, 1.0, 1.5, 2.0, 2.5]
  k2_values: [0.5, 1.0, 1.5, 2.0, 2.5]
  alt_util_threshold: 0.95

# ─── OBJECTIVOS (pesos para scoring) ───

objectives:
  tardiness_weight: 10000   # NUNCA atrasar
  earliness_weight: 500     # produzir o mais tarde possível (JIT)
  setup_weight: 10          # menos setups melhor
  balance_weight: 20        # balancear carga entre máquinas

