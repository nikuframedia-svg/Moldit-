  BFP125: ["1403150X050", "1413147X070"]   # FAURECIA (PRM043)
  BFP162: ["1768601X030", "1768602X030"]   # FAURECIA (PRM031)
  BFP171: ["2689556X090", "2689557X090"]   # FAURECIA/TEKNIK (PRM031)
  BFP172: ["2513974X100", "2785359X050"]   # FAURECIA (PRM043)
  BFP178: ["2100373X120.10", "2185094X110.10"]  # FAURECIA (PRM039)
  BFP179: ["5246946X080", "5246947X080"]   # FAURECIA (PRM019)
  BTL013: ["VW2872957", "VW2872960"]       # BENTELER (PRM039)

