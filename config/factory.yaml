# Moldit Factory Configuration
# All factory definitions live here.

# --- IDENTITY ---
factory:
  name: "Moldit"
  site: ""
  timezone: "Europe/Lisbon"

# --- SHIFTS ---
shifts:
  - id: "A"
    start: "07:00"
    end: "15:30"
    label: "Manhã"
  - id: "B"
    start: "15:30"
    end: "00:00"
    label: "Tarde"

# --- MACHINES ---
machines: {}

# --- TOOLS ---
tools:
  _default:
    setup_hours: 0.5

# --- TWINS ---
twins: {}

# --- OPERATORS ---
operators: {}

# --- SETUP CREWS ---
setup_crews: 1

# --- HOLIDAYS 2026 ---
holidays:
  - "2026-01-01"
  - "2026-04-03"
  - "2026-04-05"
  - "2026-04-25"
  - "2026-05-01"
  - "2026-06-04"
  - "2026-06-10"
  - "2026-08-15"
  - "2026-10-05"
  - "2026-11-01"
  - "2026-12-01"
  - "2026-12-08"
  - "2026-12-25"

# --- PRODUCTION ---
production:
  oee_default: 0.66
  eco_lot_mode: "hard"
  min_prod_min: 1.0

# --- SCHEDULER ---
scheduler:
  max_run_days: 5
  max_edd_gap: 10
  edd_swap_tolerance: 5
  lst_safety_buffer: 2
  campaign_window: 15
  urgency_threshold: 5
  interleave_enabled: true
  auto_buffer: true
  jit:
    enabled: true
    buffer_pct: 0.05
    threshold: 95.0
    earliness_target: 5.5

# --- SCORING ---
scoring:
  weights:
    earliness: 0.40
    setups: 0.30
    utilization_balance: 0.30

# --- RISK ---
risk:
  oee_distribution:
    type: "beta"
    alpha: 10.6
    beta: 5.5
  setup_cv: 0.20
  processing_cv: 0.10
