# ─── SCHEDULER ───
scheduler:
  max_run_days: 5
  max_edd_gap: 10
  edd_swap_tolerance: 5
  lst_safety_buffer: 2
  campaign_window: 15
  urgency_threshold: 5
  interleave_enabled: true
  auto_buffer: true
  jit:
    enabled: true
    buffer_pct: 0.05
    threshold: 95.0

